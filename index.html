<html lang="en">

<style>
  :root {

    --muted: #6b7590; --mono: 'Share Tech Mono', monospace;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; padding-bottom: 40px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--ui); font-weight: 700; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .logo span { color: var(--muted); font-weight: 400; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }

  main { padding: 16px; max-width: 600px; margin: 0 auto; }

  .quick-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }

  .time-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }

  .now-btn:active { background: var(--border); }

  .ai-bar textarea { border: none; background: transparent; padding: 0; font-size: 15px; min-height: 60px; margin-bottom: 8px; }
  .ai-bar textarea:focus { border: none; }
  .ai-actions { display: flex; gap: 8px; }
  .ai-btn { flex: 1; background: var(--accent); color: var(--bg); border: none; border-radius: 6px; font-family: var(--ui); font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; padding: 10px; cursor: pointer; transition: opacity 0.2s; }
  .ai-btn:active { opacity: 0.75; }
  .ai-btn.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); flex: 0 0 auto; padding: 10px 14px; }

  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
