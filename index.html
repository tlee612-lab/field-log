<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TLI Field Log</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #141720; --surface2: #1c2030; --border: #2a3045;
    --accent: #00c8a0; --accent2: #0090ff; --warn: #ff6b35; --text: #d8dde8;
    --muted: #6b7590; --mono: 'Share Tech Mono', monospace;
    --ui: 'Barlow Condensed', sans-serif; --body: 'Barlow', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; padding-bottom: 40px; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 16px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--ui); font-weight: 700; font-size: 20px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); }
  .logo span { color: var(--muted); font-weight: 400; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  main { padding: 16px; max-width: 600px; margin: 0 auto; }
  .section-label { font-family: var(--ui); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; margin-top: 20px; }
  .quick-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-family: var(--ui); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  input, select, textarea { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--body); font-size: 16px; padding: 11px 12px; width: 100%; outline: none; transition: border-color 0.2s; -webkit-appearance: none; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 100px; line-height: 1.5; }
  .time-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; align-items: end; }
  .now-btn { background: var(--surface2); border: 1px solid var(--accent); border-radius: 20px; color: var(--accent); font-family: var(--ui); font-size: 12px; letter-spacing: 1px; padding: 11px 16px; cursor: pointer; white-space: nowrap; }
  .now-btn:active { background: var(--border); }
  .ai-bar { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .ai-bar textarea { border: none; background: transparent; padding: 0; font-size: 15px; min-height: 60px; margin-bottom: 8px; }
  .ai-bar textarea:focus { border: none; }
  .ai-actions { display: flex; gap: 8px; }
  .ai-btn { flex: 1; background: var(--accent); color: var(--bg); border: none; border-radius: 20px; font-family: var(--ui); font-weight: 700; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; padding: 10px; cursor: pointer; transition: opacity 0.2s; }
  .ai-btn:active { opacity: 0.75; }
  .ai-btn.secondary { background: var(--surface); border: 1px solid var(--accent2); color: var(--accent2); flex: 0 0 auto; padding: 10px 16px; }
  .submit-btn { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 8px; font-family: var(--ui); font-weight: 700; font-size: 18px; letter-spacing: 3px; text-transform: uppercase; padding: 16px; cursor: pointer; margin-top: 20px; transition: opacity 0.2s, transform 0.1s; }
  .submit-btn:active { transform: scale(0.98); opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: var(--bg); font-family: var(--ui); font-weight: 700; font-size: 14px; letter-spacing: 1px; padding: 12px 24px; border-radius: 8px; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--warn); }
  .ai-preview { background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; padding: 12px; margin-top: 8px; font-size: 14px; line-height: 1.6; display: none; white-space: pre-wrap; font-family: var(--mono); color: var(--accent); }
  .ai-preview.visible { display: block; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid transparent; border-top-color: var(--bg); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .log-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
  .log-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .log-case { font-family: var(--ui); font-weight: 700; font-size: 13px; letter-spacing: 1px; color: var(--accent); text-transform: uppercase; }
  .log-time { font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .log-type { font-family: var(--ui); font-size: 11px; letter-spacing: 1px; color: var(--accent2); text-transform: uppercase; margin-bottom: 4px; }
  .log-notes { font-size: 13px; color: var(--muted); line-height: 1.4; }
  .log-unsynced { font-size: 10px; color: var(--warn); font-family: var(--ui); letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .sync-btn { width: 100%; background: transparent; border: 1px solid var(--warn); border-radius: 8px; color: var(--warn); font-family: var(--ui); font-weight: 700; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; padding: 12px; cursor: pointer; margin-top: 10px; display: none; transition: background 0.2s; }
  .sync-btn:active { background: rgba(255,107,53,0.15); }
  .config-section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 8px; }
  .config-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .config-row:last-child { margin-bottom: 0; }
  .config-row input { flex: 1; }
  .config-row label { font-family: var(--ui); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; min-width: 80px; }
  details summary { cursor: pointer; font-family: var(--ui); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); background: var(--surface2); border: 1px solid var(--accent2); border-radius: 20px; padding: 8px 16px; list-style: none; display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; }
  details summary::-webkit-details-marker { display: none; }
  details[open] summary { color: var(--accent); border-color: var(--accent); }
  .travel-section { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.3s ease; pointer-events: none; }
  .travel-section.visible { max-height: 200px; opacity: 1; pointer-events: all; }
</style>
</head>
<body>
<header>
  <div>
    <div class="logo">TLI <span>Field Log</span></div>
    <div id="headerName" style="font-family:var(--ui);font-size:11px;letter-spacing:1px;color:var(--muted);margin-top:2px"></div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</header>
<main>
  <datalist id="caseList"></datalist>
  <datalist id="clientList"></datalist>
  <div class="section-label">Quick Entry</div>
  <div class="field-group" style="margin-bottom:8px">
    <label>Investigator</label>
    <input type="text" id="investigatorField" placeholder="Investigator name" autocomplete="off" autocapitalize="words">
  </div>
  <div class="quick-row" style="margin-bottom:8px">
    <div class="field-group">
      <label>Case #</label>
      <input type="text" id="caseNum" placeholder="e.g. 25CR12345" autocomplete="off" autocapitalize="characters" list="caseList" oninput="onCaseInput(this.value)">
    </div>
    <div class="field-group">
      <label>Client Last Name</label>
      <input type="text" id="clientLast" placeholder="e.g. Smith" autocomplete="off" autocapitalize="words" list="clientList" oninput="onClientInput(this.value)">
    </div>
  </div>
  <div class="field-group" style="margin-bottom:8px">
    <label>Activity Type</label>
    <select id="actType" onchange="onTypeChange(this.value)">
      <option value="">— Select —</option>
      <option>Investigator Service - Case Intake &amp; File Audit</option>
      <option>Investigator Service - Strategic Planning</option>
      <option>Investigator Service - Case Consultation</option>
      <option>Investigator Service - Discovery Analysis &amp; Evidence Review</option>
      <option>Investigator Service - Intelligence Gathering &amp; OSINT</option>
      <option>Investigator Service - Tactical Field Operations &amp; Scene Documentation</option>
      <option>Investigator Service - Witness Development &amp; Interviews</option>
      <option>Investigator Service - Investigative Reporting &amp; Documentation</option>
      <option>Investigator Service - Court Appearance &amp; Testimony</option>
      <option>Investigator Service - Travel Time</option>
    </select>
  </div>
  <div class="time-row" style="margin-bottom:8px">
    <div class="field-group">
      <label>Date</label>
      <input type="date" id="actDate">
    </div>
    <div class="field-group">
      <label>Time</label>
      <input type="time" id="actTime">
    </div>
    <button class="now-btn" onclick="setNow()">NOW</button>
  </div>
  <div class="field-group" style="margin-bottom:8px; max-width:180px">
    <label>Duration (mins)</label>
    <input type="number" id="actDuration" placeholder="e.g. 90" step="1" min="0">
  </div>
  <div class="travel-section" id="travelSection">
    <div class="quick-row" style="margin-bottom:8px">
      <div class="field-group">
        <label>Mileage</label>
        <input type="number" id="actMileage" placeholder="e.g. 42" step="0.1" min="0">
      </div>
    </div>
    <div class="quick-row" style="margin-bottom:8px">
      <div class="field-group">
        <label>From (City)</label>
        <input type="text" id="travelFrom" placeholder="e.g. Medford" autocomplete="off" autocapitalize="words">
      </div>
      <div class="field-group">
        <label>To (City)</label>
        <input type="text" id="travelTo" placeholder="e.g. Jacksonville" autocomplete="off" autocapitalize="words">
      </div>
    </div>
  </div>
  <div class="field-group" style="margin-bottom:8px">
    <label>Notes</label>
    <textarea id="actNotes" placeholder="Location, observations, contacts, findings..."></textarea>
  </div>
  <div class="section-label">AI Assist — Dictate / Summarize</div>
  <div class="ai-bar">
    <textarea id="aiInput" placeholder="Type or paste raw notes, voice-to-text, or a rough summary. Claude will clean it up and extract fields automatically..."></textarea>
    <div id="aiPreview" class="ai-preview"></div>
    <div class="ai-actions">
      <button class="ai-btn" id="aiParseBtn" onclick="aiParse()">⚡ Parse &amp; Fill</button>
      <button class="ai-btn secondary" onclick="document.getElementById('aiInput').value=''">Clear</button>
    </div>
  </div>
  <button class="submit-btn" id="submitBtn" onclick="submitEntry()">LOG ACTIVITY →</button>
  <div style="margin-top:24px">
    <details id="configDetails">
      <summary>▸ Settings</summary>
      <div class="config-section">
        <div class="section-label" style="margin-top:0;margin-bottom:8px">Google Drive Settings</div>
        <div class="config-row">
          <label>Webhook URL</label>
          <input type="text" id="webhookUrl" placeholder="https://script.google.com/macros/s/..." autocomplete="off">
          <button id="urlLockBtn" onclick="toggleUrlLock()" style="background:var(--surface2);border:1px solid var(--border);border-radius:20px;color:var(--muted);font-family:var(--ui);font-size:11px;letter-spacing:1px;padding:8px 12px;cursor:pointer;white-space:nowrap;flex:0 0 auto">🔒 Locked</button>
        </div>
        <button class="ai-btn" style="margin-top:8px;max-width:120px" onclick="saveConfig()">Save</button>
        <button class="ai-btn secondary" style="margin-top:8px;max-width:120px" onclick="testWebhook()">Test</button>
        <button class="ai-btn secondary" style="margin-top:8px;max-width:120px" onclick="syncAll()">Sync All</button>
        <button class="ai-btn secondary" style="margin-top:8px;max-width:160px" onclick="fetchRemoteCases(true)">Refresh Cases</button>
        <button class="ai-btn secondary" style="margin-top:8px;max-width:160px;color:var(--warn);border-color:var(--warn);background:transparent" onclick="clearAllEntries()">Clear All Local</button>
      </div>
    </details>
  </div>
  <div class="section-label" style="margin-top:24px;display:flex;justify-content:space-between;align-items:center">
    <span>Recent Entries (Local)</span>
    <button id="clearSyncedBtn" onclick="clearSynced()" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--ui);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:5px 12px;border-radius:20px;display:none">Clear Synced</button>
  </div>
  <p style="font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:8px">This device only. Google Sheets is the complete record.</p>
  <button class="sync-btn" id="syncBtn" onclick="syncPending()">↑ Sync Pending to Drive</button>
  <div id="recentLog"></div>
</main>
<div class="toast" id="toast"></div>
<script>
const DEFAULT_WEBHOOK = 'https://script.google.com/macros/s/AKfycbxUcyYasL_3vMIpcwTgfBJNzWpK7jE81Puyiw7nxL6BhfX3fy8ZPCqY9rDAZZ6OC2Ud/exec';
let cfg = JSON.parse(localStorage.getItem('tli_cfg') || '{"webhookUrl":""}');
if (!cfg.webhookUrl) cfg.webhookUrl = DEFAULT_WEBHOOK;
document.getElementById('webhookUrl').value = cfg.webhookUrl || '';
document.getElementById('investigatorField').value = localStorage.getItem('tli_last_investigator') || '';
setUrlLock(!!cfg.webhookUrl);

function setUrlLock(locked) {
  const input = document.getElementById('webhookUrl');
  const btn = document.getElementById('urlLockBtn');
  input.readOnly = locked;
  input.style.opacity = locked ? '0.5' : '1';
  btn.textContent = locked ? '🔒 Locked' : '🔓 Unlock';
  btn.style.borderColor = locked ? 'var(--border)' : 'var(--warn)';
  btn.style.color = locked ? 'var(--muted)' : 'var(--warn)';
}

function toggleUrlLock() {
  const input = document.getElementById('webhookUrl');
  setUrlLock(!input.readOnly);
}

function updateHeaderName() {
  const el = document.getElementById('headerName');
  const name = localStorage.getItem('tli_last_investigator') || '';
  el.textContent = name ? name.toUpperCase() : '';
}
updateHeaderName();

let knownCases = JSON.parse(localStorage.getItem('tli_cases') || '[]');

function refreshDataLists() {
  document.getElementById('caseList').innerHTML = knownCases.map(p => `<option value="${p.case}">${p.case} · ${p.client}</option>`).join('');
  document.getElementById('clientList').innerHTML = [...new Map(knownCases.map(p => [p.client, p])).values()].map(p => `<option value="${p.client}">`).join('');
}
refreshDataLists();

async function fetchRemoteCases(verbose = false) {
  if (!cfg.webhookUrl) { if (verbose) showToast('No webhook URL configured', true); return; }
  try {
    const res = await fetch(cfg.webhookUrl + '?action=getCases');
    const data = await res.json();
    if (data.status === 'ok' && Array.isArray(data.cases)) {
      let added = 0;
      data.cases.forEach(p => {
        if (!knownCases.find(k => k.case.toLowerCase() === p.case.toLowerCase())) {
          knownCases.push(p);
          added++;
        }
      });
      if (added) {
        localStorage.setItem('tli_cases', JSON.stringify(knownCases));
        refreshDataLists();
      }
      if (data.lastInvestigator && !localStorage.getItem('tli_last_investigator')) {
        localStorage.setItem('tli_last_investigator', data.lastInvestigator);
        document.getElementById('investigatorField').value = data.lastInvestigator;
        updateHeaderName();
      }
      if (verbose) showToast('✓ ' + data.cases.length + ' cases loaded from Drive');
    } else {
      if (verbose) showToast('No cases returned from Drive', true);
    }
  } catch(e) {
    if (verbose) showToast('Failed: ' + e.message, true);
  }
}
fetchRemoteCases();

function onCaseInput(val) {
  const match = knownCases.find(p => p.case.toLowerCase() === val.toLowerCase());
  if (match) document.getElementById('clientLast').value = match.client;
}

function onClientInput(val) {
  const match = knownCases.find(p => p.client.toLowerCase() === val.toLowerCase());
  if (match) document.getElementById('caseNum').value = match.case;
}

function saveKnownCase(caseNum, client) {
  if (!caseNum || !client) return;
  const exists = knownCases.find(p => p.case.toLowerCase() === caseNum.toLowerCase());
  if (!exists) {
    knownCases.push({ case: caseNum, client });
    localStorage.setItem('tli_cases', JSON.stringify(knownCases));
    refreshDataLists();
  }
}

function saveConfig() {
  cfg.webhookUrl = document.getElementById('webhookUrl').value.trim();
  localStorage.setItem('tli_cfg', JSON.stringify(cfg));
  if (cfg.webhookUrl) setUrlLock(true);
  showToast('Config saved');
}

async function testWebhook() {
  if (!cfg.webhookUrl) { showToast('Paste webhook URL first', true); return; }
  try {
    await fetch(cfg.webhookUrl, { method: 'GET', mode: 'no-cors' });
    showToast('✓ Webhook reachable — check Sheets to confirm');
  } catch(err) {
    showToast('Connection failed', true);
  }
}

let entries = JSON.parse(localStorage.getItem('tli_entries') || '[]');

function fmtDateTime(date, time) {
  if (!date) return '';
  const [y, m, d] = date.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let out = `${months[+m-1]} ${+d}, ${y}`;
  if (time) {
    const [h, min] = time.split(':');
    const period = +h >= 12 ? 'PM' : 'AM';
    const h12 = +h % 12 || 12;
    out += ` · ${h12}:${min} ${period}`;
  }
  return out;
}

function renderLog() {
  const el = document.getElementById('recentLog');
  if (!entries.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0">No entries yet</p>'; return; }
  const unsynced = entries.filter(e => e.synced === false);
  const synced = entries.filter(e => e.synced !== false);
  const btn = document.getElementById('clearSyncedBtn');
  if (btn) btn.style.display = synced.length ? '' : 'none';
  const toShow = [...unsynced, ...synced.slice(-5)].sort((a, b) => (b.logged || '').localeCompare(a.logged || ''));
  el.innerHTML = toShow.map(e => `
    <div class="log-item">
      <div class="log-meta">
        <div class="log-case">${e.case || '—'}${e.client ? ' · ' + e.client : ''}</div>
        <div class="log-time">${fmtDateTime(e.date, e.time)}</div>
      </div>
      <div class="log-type">${e.type || 'Activity'}${e.duration ? ' · ' + e.duration + ' mins' : ''}${e.mileage ? ' · ' + e.mileage + ' mi' : ''}</div>
      <div class="log-notes">${(e.notes||'').slice(0,120)}${(e.notes||'').length>120?'…':''}</div>
      ${e.synced === false ? '<div class="log-unsynced">⚠ Not synced</div>' : ''}
    </div>
  `).join('');
}

function updateSyncBtn() {
  const btn = document.getElementById('syncBtn');
  const pending = entries.filter(e => e.synced === false);
  if (cfg.webhookUrl && pending.length) {
    btn.style.display = '';
    btn.textContent = '↑ Sync ' + pending.length + ' Pending to Drive';
  } else {
    btn.style.display = 'none';
  }
}

async function syncPending() {
  const pending = entries.filter(e => e.synced === false);
  if (!pending.length) return;
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Syncing...';
  try {
    await postToWebhook(pending);
    pending.forEach(e => e.synced = true);
    localStorage.setItem('tli_entries', JSON.stringify(entries));
    renderLog();
    updateSyncBtn();
    showToast('✓ ' + pending.length + ' ' + (pending.length === 1 ? 'entry' : 'entries') + ' synced to Drive');
  } catch(err) {
    showToast('Sync failed — check connection', true);
    btn.disabled = false;
    updateSyncBtn();
  }
}

renderLog();
updateSyncBtn();

function setNow() {
  const now = new Date();
  document.getElementById('actDate').value = now.toISOString().slice(0,10);
  document.getElementById('actTime').value = now.toTimeString().slice(0,5);
}
setNow();

async function aiParse() {
  const raw = document.getElementById('aiInput').value.trim();
  if (!raw) { showToast('Enter some notes first', true); return; }
  const btn = document.getElementById('aiParseBtn');
  btn.innerHTML = '<span class="spinner"></span>Parsing...';
  btn.disabled = true;
  document.getElementById('aiPreview').classList.remove('visible');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are a field assistant for a licensed private investigator working criminal defense cases in Oregon. Extract structured fields from raw investigator notes. Respond ONLY with a JSON object, no markdown, no preamble.\n\nFields:\n- case: Oregon court case number e.g. 25CR12345 (or "")\n- client: client last name (or "")\n- type: one of exactly: "Investigator Service - Case Intake & File Audit", "Investigator Service - Strategic Planning", "Investigator Service - Case Consultation", "Investigator Service - Discovery Analysis & Evidence Review", "Investigator Service - Intelligence Gathering & OSINT", "Investigator Service - Tactical Field Operations & Scene Documentation", "Investigator Service - Witness Development & Interviews", "Investigator Service - Investigative Reporting & Documentation", "Investigator Service - Court Appearance & Testimony", "Investigator Service - Travel Time"\n- date: YYYY-MM-DD (today if not specified: ${new Date().toISOString().slice(0,10)})\n- time: HH:MM 24h (or "")\n- duration: integer minutes as string (or "")\n- mileage: miles as string (or "")\n- travelFrom: origin city (or "")\n- travelTo: destination city (or "")\n- notes: clean 1-3 sentence professional summary`,
        messages: [{ role: 'user', content: raw }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text||'').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    if (parsed.case) document.getElementById('caseNum').value = parsed.case;
    if (parsed.client) document.getElementById('clientLast').value = parsed.client;
    if (parsed.type) { document.getElementById('actType').value = parsed.type; onTypeChange(parsed.type); }
    if (parsed.date) document.getElementById('actDate').value = parsed.date;
    if (parsed.time) document.getElementById('actTime').value = parsed.time;
    if (parsed.duration) document.getElementById('actDuration').value = parsed.duration;
    if (parsed.mileage) document.getElementById('actMileage').value = parsed.mileage;
    if (parsed.travelFrom) document.getElementById('travelFrom').value = parsed.travelFrom;
    if (parsed.travelTo) document.getElementById('travelTo').value = parsed.travelTo;
    if (parsed.notes) document.getElementById('actNotes').value = parsed.notes;
    const preview = document.getElementById('aiPreview');
    preview.textContent = '✓ Parsed:\n' + JSON.stringify(parsed, null, 2);
    preview.classList.add('visible');
    showToast('Fields filled — review and submit');
  } catch(err) {
    showToast('Parse failed: ' + err.message, true);
  }
  btn.innerHTML = '⚡ Parse & Fill';
  btn.disabled = false;
}

function onTypeChange(val) {
  const sec = document.getElementById('travelSection');
  if (val === 'Investigator Service - Travel Time') sec.classList.add('visible');
  else sec.classList.remove('visible');
}

async function submitEntry() {
  const isTravel = document.getElementById('actType').value === 'Investigator Service - Travel Time';
  const base = {
    case: document.getElementById('caseNum').value.trim(),
    client: document.getElementById('clientLast').value.trim(),
    type: document.getElementById('actType').value,
    date: document.getElementById('actDate').value,
    time: document.getElementById('actTime').value,
    duration: document.getElementById('actDuration').value,
    mileage: '', travelFrom: '', travelTo: '',
    notes: document.getElementById('actNotes').value.trim(),
    investigator: document.getElementById('investigatorField').value.trim(),
    logged: new Date().toISOString(),
    synced: false
  };
  if (!base.case || !base.client || !base.type || !base.notes) {
    showToast('Case #, client last name, type, and notes required', true); return;
  }
  saveKnownCase(base.case, base.client);
  if (base.investigator) localStorage.setItem('tli_last_investigator', base.investigator);
  const toLog = [base];
  if (isTravel) {
    toLog.push({
      ...base, type: 'Mileage', duration: '',
      mileage: document.getElementById('actMileage').value,
      travelFrom: document.getElementById('travelFrom').value.trim(),
      travelTo: document.getElementById('travelTo').value.trim(),
      notes: `Travel: ${document.getElementById('travelFrom').value.trim()} → ${document.getElementById('travelTo').value.trim()}`
    });
  }
  const btn = document.getElementById('submitBtn');
  btn.innerHTML = '<span class="spinner"></span>Logging...';
  btn.disabled = true;
  toLog.forEach(e => entries.push(e));
  if (cfg.webhookUrl) {
    try {
      btn.innerHTML = '<span class="spinner"></span>Syncing to Drive...';
      await postToWebhook(toLog);
      toLog.forEach(e => { e.synced = true; });
      showToast(isTravel ? '✓ 2 entries logged to Drive' : '✓ Logged to Google Drive');
    } catch(err) {
      showToast('Saved locally — Drive sync failed', true);
    }
  } else {
    showToast(isTravel ? '✓ 2 entries logged locally' : '✓ Logged locally — configure webhook to sync');
  }
  localStorage.setItem('tli_entries', JSON.stringify(entries));
  renderLog();
  updateSyncBtn();
  ['actNotes','clientLast','caseNum','actMileage','travelFrom','travelTo','actDuration','aiInput'].forEach(id => document.getElementById(id).value = '');
  const lastInv = localStorage.getItem('tli_last_investigator') || '';
  document.getElementById('investigatorField').value = lastInv;
  document.getElementById('aiPreview').classList.remove('visible');
  document.getElementById('actType').value = '';
  onTypeChange('');
  setNow();
  btn.innerHTML = 'LOG ACTIVITY →';
  btn.disabled = false;
}

async function postToWebhook(entries) {
  const url = cfg.webhookUrl + '?data=' + encodeURIComponent(JSON.stringify(entries));
  await fetch(url, { method: 'GET', mode: 'no-cors' });
}

async function syncAll() {
  if (!cfg.webhookUrl) { showToast('Paste webhook URL first', true); return; }
  if (!entries.length) { showToast('No local entries to sync', true); return; }
  try {
    await postToWebhook(entries);
    entries.forEach(e => e.synced = true);
    localStorage.setItem('tli_entries', JSON.stringify(entries));
    renderLog();
    updateSyncBtn();
    showToast('✓ All ' + entries.length + ' entries synced to Drive');
  } catch(err) {
    showToast('Sync failed — check connection', true);
  }
}

function clearSynced() {
  entries = entries.filter(e => e.synced === false);
  localStorage.setItem('tli_entries', JSON.stringify(entries));
  renderLog();
  updateSyncBtn();
  showToast('Synced entries cleared');
}

function clearAllEntries() {
  if (!confirm('Delete all local entries? This cannot be undone.')) return;
  entries = [];
  localStorage.setItem('tli_entries', JSON.stringify(entries));
  renderLog();
  updateSyncBtn();
  showToast('All local entries cleared');
}

function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
